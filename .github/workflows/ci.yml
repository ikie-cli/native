name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  test:
    name: Test (${{ matrix.os }})
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2025, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - run: npm ci
      - run: npm run typecheck
      - run: npm run test:ranked
      - run: npm run build:ranked

      # Unit + renderer + integration (needs Node-ABI better-sqlite3 + a JDK)
      - run: npm run rebuild:node
      - run: npx vitest run

      # Build app bundles, then Electron-ABI native modules for E2E
      - run: npm run build
      - run: npm run rebuild:electron

      - name: E2E (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a --server-args='-screen 0 1600x900x24' npx playwright test --project e2e
      - name: E2E (Windows/macOS)
        if: runner.os != 'Linux'
        run: npx playwright test --project e2e

      - name: Visual QA (Linux)
        if: runner.os == 'Linux'
        run: |
          xvfb-run -a --server-args='-screen 0 1600x900x24' npx playwright test --project visual-qa
          node scripts/qa-report.mjs
      - name: Upload QA report
        if: runner.os == 'Linux' && always()
        uses: actions/upload-artifact@v6
        with:
          name: qa-report
          path: |
            qa-report.md
            qa-screenshots/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results-${{ matrix.os }}
          path: test-results/
          if-no-files-found: ignore
          retention-days: 14

  package:
    name: Package (${{ matrix.platform }}-${{ matrix.arch }})
    needs: test
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            arch: x64
            os: ubuntu-24.04
            artifacts: |
              dist/*.AppImage
              dist/*.deb
              dist/release-meta-*.yml
          - platform: linux
            arch: arm64
            # electron-builder's deb toolchain (fpm) is x64-only; cross-package
            # ARM64 on the x64 runner while Electron/native modules target ARM64.
            os: ubuntu-24.04
            artifacts: |
              dist/*.AppImage
              dist/*.deb
              dist/release-meta-*.yml
          - platform: windows
            arch: x64
            os: windows-2025
            artifacts: |
              dist/*.exe
              dist/*.blockmap
              dist/release-meta-*.yml
          - platform: windows
            arch: arm64
            os: windows-11-arm
            artifacts: |
              dist/*.exe
              dist/*.blockmap
              dist/release-meta-*.yml
          - platform: mac
            arch: x64
            os: macos-15-intel
            artifacts: |
              dist/*.dmg
              dist/*.zip
              dist/*.blockmap
              dist/release-meta-*.yml
          - platform: mac
            arch: arm64
            os: macos-15
            artifacts: |
              dist/*.dmg
              dist/*.zip
              dist/*.blockmap
              dist/release-meta-*.yml
    runs-on: ${{ matrix.os }}
    env:
      # Empty unless the SignPath Foundation secret is configured. All signing
      # steps below are gated on this, so CI keeps producing working unsigned
      # builds until the project is approved and the secret is added.
      SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: npm run build:ranked
      - name: Configure optional code signing
        env:
          TARGET_PLATFORM: ${{ matrix.platform }}
          WIN_CERTIFICATE: ${{ secrets.WIN_CSC_LINK }}
          WIN_CERTIFICATE_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          MAC_CERTIFICATE: ${{ secrets.MAC_CSC_LINK }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          NOTARY_APPLE_ID: ${{ secrets.APPLE_ID }}
          NOTARY_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          NOTARY_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: node scripts/configure-signing-env.mjs
      - name: Build ${{ matrix.platform }} package
        env:
          # Force the single-stream BCJ x86 filter for the NSIS/7z app payload
          # instead of the default BCJ2. On the Windows runner, 7zip-bin ships
          # 7-Zip 21.x, whose BCJ2 encoder is multithreaded: it splits input into
          # thread-sized blocks whose boundaries shift when any upstream byte
          # changes, so differential (delta) updates find almost no reusable
          # blocks and re-download ~74% of the installer every release. BCJ is
          # deterministic → ~97% block reuse, shrinking update downloads from
          # ~68 MB to ~3 MB. Costs ~6-8 MB on the one-time full installer.
          # Ignored on non-7z targets (Linux AppImage/deb, mac dmg). Stock
          # electron-builder hook (allowed: BCJ/BCJ2/ARM/ARMT/IA64/PPC/SPARC/DELTA).
          ELECTRON_BUILDER_7Z_FILTER: BCJ
        run: >-
          npx electron-vite build && npx electron-builder
          --${{ matrix.platform }} --${{ matrix.arch }} --publish never
          --config.publish.channel=${{ contains(github.ref_name, '-nightly.') && 'nightly' || contains(github.ref_name, '-beta.') && 'beta' || 'latest' }}
          ${{ matrix.platform == 'mac' && secrets.MAC_CSC_LINK != '' && '--config.mac.notarize=true' || '' }}

      # --- SignPath Foundation code signing (Windows x64, free OSS program) ---
      # Runs only when SIGNPATH_API_TOKEN is set. SignPath signs server-side on
      # its HSM and requires manual approval of each request, so this cannot use
      # electron-builder's inline sign hook — we build unsigned, submit the exe,
      # wait for approval, download the signed exe, then repack update metadata.
      - name: Upload unsigned exe for signing
        id: unsigned-exe
        if: ${{ matrix.platform == 'windows' && matrix.arch == 'x64' && env.SIGNPATH_API_TOKEN != '' }}
        uses: actions/upload-artifact@v6
        with:
          name: unsigned-win-x64
          path: dist/*.exe
          if-no-files-found: error
          retention-days: 1
      - name: Submit to SignPath and download signed exe
        if: ${{ matrix.platform == 'windows' && matrix.arch == 'x64' && env.SIGNPATH_API_TOKEN != '' }}
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ env.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ vars.SIGNPATH_ARTIFACT_CONFIG_SLUG }}
          github-artifact-id: ${{ steps.unsigned-exe.outputs.artifact-id }}
          wait-for-completion: true
          # Manual approval can take a while; allow up to 30 minutes.
          wait-for-completion-timeout-in-seconds: '1800'
          # Overwrite the unsigned exe in place so the repack step and upload
          # both operate on the signed binary.
          output-artifact-directory: dist
      - name: Repack update metadata from signed exe
        if: ${{ matrix.platform == 'windows' && matrix.arch == 'x64' && env.SIGNPATH_API_TOKEN != '' }}
        run: >-
          node scripts/repack-signed-win.mjs dist
          ${{ contains(github.ref_name, '-nightly.') && 'nightly' || contains(github.ref_name, '-beta.') && 'beta' || 'latest' }}

      - name: Stage architecture-specific update metadata
        run: >-
          node scripts/stage-release-metadata.mjs dist
          ${{ matrix.platform }} ${{ matrix.arch }}
          ${{ contains(github.ref_name, '-nightly.') && 'nightly' || contains(github.ref_name, '-beta.') && 'beta' || 'latest' }}

      - uses: actions/upload-artifact@v6
        with:
          name: packages-${{ matrix.platform }}-${{ matrix.arch }}
          path: ${{ matrix.artifacts }}
          if-no-files-found: error
          retention-days: 14

  release:
    name: Release (tagged)
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - uses: actions/download-artifact@v6
        with:
          pattern: packages-*
          merge-multiple: true
          path: dist
      - name: Merge architecture-specific update feeds
        run: node scripts/prepare-release-metadata.mjs dist ${{ github.ref_name }}
      - name: Create GitHub Release with update feeds
        uses: softprops/action-gh-release@v2
        with:
          repository: ikie-cli/native-releases
          token: ${{ secrets.RELEASE_TOKEN }}
          prerelease: ${{ contains(github.ref_name, '-beta.') || contains(github.ref_name, '-nightly.') }}
          make_latest: ${{ !contains(github.ref_name, '-') }}
          files: |
            dist/*.AppImage
            dist/*.deb
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
            dist/*.yml
          fail_on_unmatched_files: true
          generate_release_notes: true

  verify-release:
    name: Verify public release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: release
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: node scripts/verify-release.mjs ikie-cli/native-releases ${{ github.ref_name }}

  bridge-legacy-feed:
    name: Publish legacy website update
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-')
    needs: verify-release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_PAGES_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          path: site
      - name: Mirror migration release to website feed
        shell: bash
        run: |
          mkdir -p site/website/updates
          release_url="https://github.com/ikie-cli/native-releases/releases/download/${{ github.ref_name }}"
          curl --fail --location --retry 3 "$release_url/latest.yml" --output site/website/updates/latest.yml
          curl --fail --location --retry 3 "$release_url/latest-linux-arm64.yml" --output site/website/updates/latest-linux-arm64.yml
          sed -i -E "s#^([[:space:]]*-?[[:space:]]*url:[[:space:]]*)([^h].*)#\\1${release_url}/\\2#" site/website/updates/latest.yml
          sed -i -E "s#^([[:space:]]*-?[[:space:]]*url:[[:space:]]*)([^h].*)#\\1${release_url}/\\2#" site/website/updates/latest-linux*.yml
      - name: Commit website feed
        working-directory: site
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -f website/updates/latest.yml website/updates/latest-linux*.yml
          if git diff --cached --quiet; then
            echo 'Website feed is already current.'
            exit 0
          fi
          git commit -m "Release: mirror ${{ github.ref_name }} to legacy update feed"
          git push origin HEAD:main
      - name: Deploy updated website and legacy feeds
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_PAGES_PROJECT_NAME != ''
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site/website --project-name=${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }} --branch=main --commit-dirty=true
      - name: Confirm Git-connected website deployment
        if: env.CLOUDFLARE_API_TOKEN == '' || env.CLOUDFLARE_ACCOUNT_ID == '' || env.CLOUDFLARE_PAGES_PROJECT_NAME == ''
        run: echo "Cloudflare credentials are not stored in GitHub; the repository push is left for the existing Pages Git integration to deploy."
