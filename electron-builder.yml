appId: app.nativelauncher.desktop
productName: Native
copyright: Copyright © 2026 Native Labs
directories:
  buildResources: build
  output: dist
afterPack: scripts/after-pack.js
files:
  - out/**
  - package.json
  - '!node_modules/**/{CHANGELOG.md,README.md,readme.md,test,__tests__,tests,powered-test,example,examples}'
extraResources:
  - from: resources/icon.png
    to: icon.png
  - from: resources/tray.png
    to: tray.png
  - from: build/icon.ico
    to: icon.ico
asarUnpack:
  - '**/*.node'
npmRebuild: true
electronLanguages:
  - en-US

win:
  target:
    - target: nsis
  executableName: Native
  icon: build/icon.ico
  artifactName: ${productName}-Setup-${version}-${arch}.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  shortcutName: Native
  differentialPackage: true

linux:
  syncDesktopName: true
  target:
    - target: AppImage
    - target: deb
  icon: build/icon.png
  category: Game
  maintainer: Native Labs <support@nativelauncher.app>
  synopsis: A fast, beautiful Minecraft launcher
  description: >-
    Native is a fast, beautiful Minecraft launcher with instances, mod loaders
    (Fabric, Quilt, Forge, NeoForge), Modrinth/CurseForge content search,
    servers, worlds and automatic updates.
  artifactName: ${productName}-${version}-${arch}.${ext}
deb:
  depends:
    - libgtk-3-0
    - libnotify4
    - libnss3
    - libxss1
    - libxtst6
    - xdg-utils
    - libatspi2.0-0
    - libuuid1
    - libsecret-1-0
appImage:
  artifactName: ${productName}-${version}-${arch}.${ext}

mac:
  category: public.app-category.games
  hardenedRuntime: true
  gatekeeperAssess: false
  target:
    - target: dmg
    - target: zip
  artifactName: ${productName}-${version}-${arch}.${ext}

# Stable releases are mirrored to the legacy website feed by CI so older installs can
# migrate. Apps installed from 3.1.0 onward check GitHub Releases directly.
publish:
  provider: github
  owner: ikie-cli
  repo: native-releases
